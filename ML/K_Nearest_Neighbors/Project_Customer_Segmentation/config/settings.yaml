data:
  dataset: "customer"
  n_clusters: 5
  test_size: 0.2
  random_state: 42

model:
  n_neighbors: 5
  weights: "distance"
  metric: "euclidean"
  save_path: "models/knn_model.pkl"

preprocessing:
  apply_scaling: true

evaluation:
  metrics:
    - "accuracy"
    - "silhouette"

logging:
  level: "INFO"
  log_dir: "logs"
