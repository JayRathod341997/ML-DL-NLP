# Model serving configuration
model:
  name: distilbert-base-uncased-finetuned-sst-2-english
  type: text-classification
  labels:
    - NEGATIVE
    - POSITIVE
  device: cpu
  max_length: 512

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  log_level: info

limits:
  max_batch_size: 32
  max_text_length: 10000
