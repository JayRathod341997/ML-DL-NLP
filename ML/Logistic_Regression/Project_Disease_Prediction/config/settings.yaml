# Logistic Regression Disease Prediction Configuration

data:
  dataset: "breast_cancer"
  test_size: 0.2
  random_state: 42
  target_column: "target"

model:
  solver: "lbfgs"
  max_iter: 1000
  C: 1.0
  class_weight: "balanced"
  random_state: 42
  save_path: "models/logistic_model.pkl"

preprocessing:
  apply_scaling: true
  scaler_type: "standard"

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"

visualization:
  output_dir: "outputs"
  save_plots: true

logging:
  level: "INFO"
  log_dir: "logs"
