data:
  dataset: "creditcard"
  test_size: 0.2
  random_state: 42

model:
  n_estimators: 100
  max_depth: 10
  class_weight: "balanced"
  random_state: 42
  save_path: "models/rf_model.pkl"

preprocessing:
  apply_scaling: true

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"

logging:
  level: "INFO"
  log_dir: "logs"
